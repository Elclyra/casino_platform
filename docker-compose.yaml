services:
  postgres:
    image: postgres:17
    container_name: casino-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - casino_postgres_data:/var/lib/postgresql/data

volumes:
  casino_postgres_data: